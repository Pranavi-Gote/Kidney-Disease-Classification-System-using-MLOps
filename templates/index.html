	<style>

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body{
    background: #eef4fb;
    min-height: 100vh;
    padding: 20px;
}

.main-container{
    width: 100%;
    max-width: 1400px;
    margin: auto;
}

.title{
    text-align: center;
    margin-bottom: 30px;
}

.title h1{
    font-size: 52px;
    color: #0b2c5f;
    font-weight: 700;
}

.title p{
    font-size: 24px;
    color: #2f5aa8;
    margin-top: 10px;
}

.content{
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 50px;
    margin-top: 30px;
}

.left-panel{
    width: 42%;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.upload-box{
    width: 420px;
    height: 420px;
    border: 3px solid #1d4e89;
    border-radius: 18px;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

.upload-box img{
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}

.button-group{
    display: flex;
    gap: 25px;
    margin-top: 25px;
}

.btn{
    border: none;
    padding: 16px 42px;
    font-size: 20px;
    font-weight: bold;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}

.upload-btn{
    background: #1e88ff;
    color: white;
}

.predict-btn{
    background: #17a34a;
    color: white;
}

.btn:hover{
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(0,0,0,0.12);
}

.right-panel{
    width: 58%;
    background: white;
    border-radius: 20px;
    padding: 35px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.result-title{
    text-align: center;
    font-size: 42px;
    color: #0b2c5f;
    margin-bottom: 30px;
    font-weight: bold;
}
.result-grid {
    display: flex;
    gap: 30px;
    align-items: flex-start;
}

.scan-box {
    width: 320px;
    height: fit-content;
    background: #f8fbff;
    border: 2px solid #dbe7f5;
    border-radius: 18px;
    padding: 20px;
}

.box-title {
    font-size: 24px;
    font-weight: 700;
    color: #0b3a7e;
    margin-bottom: 20px;
}

.scan-preview {
    width: 100%;
    max-height: 350px;
    object-fit: contain;
    border-radius: 12px;
    border: 2px solid #dbe7f5;
    background: white;
}
.report-box {
    flex: 1;
    max-height: 650px;
    overflow-y: auto;
    background: #f8fbff;
    border: 2px solid #dbe7f5;
    border-radius: 18px;
    padding: 28px;
}

.report-box h3 {
    color: #0b3a7e;
    font-size: 34px;
    margin-bottom: 25px;
    font-weight: 700;
}

.prediction-card {
    background: #ffffff;
    border: 2px solid #dbe7f5;
    border-radius: 18px;
    padding: 24px;
    margin-bottom: 28px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.04);
}

.prediction {
    font-size: 30px;
    font-weight: 800;
    color: #008000;
    margin-bottom: 10px;
}

.confidence {
    font-size: 24px;
    font-weight: 600;
    color: #1d4ed8;
}

.section-title {
    font-size: 30px;
    font-weight: 700;
    color: #0b3a7e;
    margin-top: 25px;
    margin-bottom: 15px;
}

ul {
    padding-left: 24px;
    margin-bottom: 20px;
}

ul li {
    font-size: 19px;
    line-height: 1.8;
    margin-bottom: 10px;
    color: #1f2937;
}

#download-report {
    display: block;
    width: 100%;
    text-align: center;
    margin-top: 30px;
    padding: 18px;
    background: linear-gradient(135deg, #0b3a7e, #1d4ed8);
    color: white;
    font-size: 22px;
    font-weight: 700;
    border-radius: 14px;
    text-decoration: none;
    transition: 0.3s;
}

#download-report:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(29,78,216,0.2);
}

.report-box::-webkit-scrollbar {
    width: 8px;
}

.report-box::-webkit-scrollbar-thumb {
    background: #b5c7e8;
    border-radius: 10px;
}

.report-box::-webkit-scrollbar-track {
    background: #eef4fb;
}
</style>
</head>

				</div>

            </div>

        </div>

    </div>

<script>

let base64Image = "";

document.getElementById("upload-btn").addEventListener("click", function () {
    document.getElementById("imageUpload").click();
});


document.getElementById("imageUpload").addEventListener("change", function (event) {
    const file = event.target.files[0];

    if (!file) return;

    const reader = new FileReader();

    reader.onload = function () {
        base64Image = reader.result.split(",")[1];

        // Left preview
        const selectedImage = document.getElementById("selected-image");
        selectedImage.src = reader.result;
        selectedImage.style.display = "block";

        // Right preview
        const displayImage = document.getElementById("display-image");
        displayImage.src = reader.result;
        displayImage.style.display = "block";
    };

    reader.readAsDataURL(file);
});


document.getElementById("predict-btn").addEventListener("click", function () {

    if (!base64Image) {
        alert("Please upload an image first.");
        return;
    }

    fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            image: base64Image
        })
    })
    .then(response => response.json())
    .then(res => {

        let reportHTML = `
            <div class="prediction-card">
                <div class="prediction">
                    Prediction: ${res.prediction}
                </div>

                <div class="confidence">
                    Confidence: ${res.confidence}%
                </div>
            </div>
        `;

        document.getElementById("report-content").innerHTML = reportHTML;


        // Treatment Suggestions
        let treatmentHTML = `
            <h4 class="section-title">Treatment Suggestions</h4>
            <ul>
        `;

        res.treatment.forEach(function(item){
            treatmentHTML += "<li>" + item + "</li>";
        });

        treatmentHTML += "</ul>";

        document.getElementById("treatment-box").innerHTML = treatmentHTML;


        // Doctor Recommendations
        let doctorHTML = `
            <h4 class="section-title">Recommended Specialists</h4>
            <ul>
        `;

        res.doctors.forEach(function(item){
            doctorHTML += "<li>" + item + "</li>";
        });

        doctorHTML += "</ul>";

        document.getElementById("doctor-box").innerHTML = doctorHTML;


        // PDF Download
        const downloadBtn = document.getElementById("download-report");
        downloadBtn.href = "/reports/" + res.report_path.split("/").pop();
        downloadBtn.style.display = "block";

    })
    .catch(error => {
        console.log(error);
        alert("Prediction failed.");
    });

});

</script>
